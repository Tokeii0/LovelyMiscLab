name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# tauri-action creates the GitHub Release + uploads the installers.
permissions:
  contents: write

jobs:
  release:
    name: Build Windows installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Runs `pnpm build` (beforeBuildCommand) + `tauri build`, then publishes the
      # NSIS/MSI installers to a draft GitHub Release.
      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LovelyMiscLab ${{ github.ref_name }}"
          releaseBody: "下载下方的安装包即可安装。"
          releaseDraft: true
          prerelease: false
